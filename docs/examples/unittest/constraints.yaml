lattices:
  lat_a:
    lattice_file: lattices/lat_a.lat.bmad
  lat_b:
    lattice_file: lattices/lat_b.lat.bmad
  lat_c:
    lattice_file: lattices/lat_c.lat.bmad

ele_equality:
  - ele_a:
      lattice_id: lat_a
      ele: END
    ele_b:
      lattice_id: lat_b
      ele: BEGINNING

  - ele_a:
      lattice_id: lat_a
      ele: END
    ele_b:
      lattice_id: lat_c
      ele: BEGINNING
    comparison:
      twiss_a_test:
        type: bmag
        max_bmag: 1.05
      floor_x_test:
        atol: 1e-6
      floor_y_test:
        atol: 1e-6
      floor_z_test:
        atol: 1e-6
