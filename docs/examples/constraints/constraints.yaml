lattices:
  lat_a:
    lattice_file: lattices/lat_a.lat.bmad
  lat_b:
    lattice_file: lattices/lat_b.lat.bmad
  lat_c:
    lattice_file: lattices/lat_c.lat.bmad

constraints:
  - constraint_type: ele_eq
    description: Short description, lat_a, lat_b treaty point
    comment: Longer comment included on error and in reports. eg Please rerun `tune_matcher.tao` in event of failure.
    ele_a:
      lattice_id: lat_a
      ele_id: END
    ele_b:
      lattice_id: lat_b
      ele_id: BEGINNING

  - constraint_type: ele_eq
    description: Example of a failing constraint
    ele_a:
      lattice_id: lat_a
      ele_id: END
    ele_b:
      lattice_id: lat_c
      ele_id: BEGINNING
    comparison:
      twiss_a_test:
        type: bmag
        max_bmag: 1.05
      floor_x_test:
        atol: 1e-6
      floor_y_test:
        atol: 1e-6
      floor_z_test:
        atol: 1e-6

  - constraint_type: ele_max_lt
    description: lat_a beta sanity check
    ele_a:
      lattice_id: lat_a
    ele_b:
      beta_a: 200
      beta_b: 200

  - constraint_type: datum_eq
    description: Datum and literal example
    datum_a:
      lattice_id: lat_a
      data_type: r56_compaction
      ele_name: END
    datum_b:
      model_value: 1.04448e-08
      design_value: 0.0