lattices:
  lat_a:
    lattice_file: lattices/lat_a.lat.bmad
  lat_b:
    lattice_file: lattices/lat_b.lat.bmad
  lat_c:
    lattice_file: lattices/lat_c.lat.bmad

equality_constraints:
  - constraint_type: ele
    ele_a:
      lattice_id: lat_a
      ele_id: END
    ele_b:
      lattice_id: lat_b
      ele_id: BEGINNING

  - constraint_type: ele
    ele_a:
      lattice_id: lat_a
      ele_id: END
    ele_b:
      lattice_id: lat_c
      ele_id: BEGINNING
    comparison:
      twiss_a_test:
        type: bmag
        max_bmag: 1.05
      floor_x_test:
        atol: 1e-6
      floor_y_test:
        atol: 1e-6
      floor_z_test:
        atol: 1e-6

  - constraint_type: datum
    datum_a:
      lattice_id: lat_a
      data_type: r56_compaction
      ele_name: END
    datum_b:
      lattice_id: lat_b
      data_type: r56_compaction
      ele_name: END